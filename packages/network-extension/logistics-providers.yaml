# Indonesia Network Extension Layer - Logistics Providers
# Indonesian courier and delivery services mapped to Beckn Fulfillment schema

version: "1.0.0"

logistics_providers:

  # ==========================================================================
  # JNE (Jalur Nugraha Ekakurir)
  # ==========================================================================
  - code: "JNE"
    name: "JNE Express"
    name_id: "JNE Express"
    description: "One of Indonesia's largest courier companies with nationwide coverage"
    operator: "PT Tiki Jalur Nugraha Ekakurir"
    beckn_fulfillment_type: "Delivery"
    beckn_provider_id: "jne.co.id"
    website: "https://www.jne.co.id"
    coverage: "nationwide"
    tracking_url_template: "https://www.jne.co.id/id/tracking/trace/{tracking_id}"
    services:
      - code: "JNE_REG"
        name: "JNE Reguler"
        name_id: "JNE Reguler"
        description: "Standard delivery service, 2-3 days within Java, 3-7 days outer islands"
        beckn_category: "Standard Delivery"
        sla:
          java_days: "2-3"
          outer_island_days: "3-7"
        max_weight_kg: 30

      - code: "JNE_YES"
        name: "JNE YES (Yakin Esok Sampai)"
        name_id: "JNE YES (Yakin Esok Sampai)"
        description: "Next-day delivery guarantee for major cities across Indonesia"
        beckn_category: "Express Delivery"
        sla:
          guaranteed_days: 1
        max_weight_kg: 30

      - code: "JNE_OKE"
        name: "JNE OKE (Ongkos Kirim Ekonomis)"
        name_id: "JNE OKE (Ongkos Kirim Ekonomis)"
        description: "Economy shipping with lower cost and longer delivery time"
        beckn_category: "Economy Delivery"
        sla:
          java_days: "3-5"
          outer_island_days: "5-10"
        max_weight_kg: 30

