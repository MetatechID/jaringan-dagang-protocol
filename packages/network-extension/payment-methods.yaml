# Indonesia Network Extension Layer - Payment Methods
# Indonesian payment methods mapped to Beckn Payment schema
# All fees are exclusive of PPN (11%) unless noted

version: "1.0.0"
currency: "IDR"

payment_methods:

  # ==========================================================================
  # QRIS (Quick Response Code Indonesian Standard)
  # ==========================================================================
  - code: "QRIS"
    name: "QRIS"
    name_id: "QRIS"
    description: "National QR payment standard by Bank Indonesia, accepted across all banks and e-wallets"
    beckn_payment_type: "ON-ORDER"
    beckn_collected_by: "BAP"
    type: "qr_code"
    category: "qris"
    operator: "Bank Indonesia"
    fee:
      type: "percentage"
      value: 0.007
      description: "MDR 0.7% charged to merchant"
    settlement_window_hours: 24
    supported_flows:
      - "pre-paid"
    tags:
      - key: "interoperable"
        value: "true"
      - key: "regulated_by"
        value: "Bank Indonesia"

