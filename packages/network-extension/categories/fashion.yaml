# Indonesia Network Extension Layer - Fashion Category Taxonomy
# Indonesian fashion categories for retail domain

version: "1.0.0"
domain: "ONDC:RET12"

categories:
  - code: "FASHION_PRIA"
    name: "Men's Fashion"
    name_id: "Fashion Pria"
    description: "Men's clothing, footwear, and accessories"
    beckn_category_id: "Mens Wear"
    sub_categories:
      - code: "FASHION_PRIA_KEMEJA"
        name: "Men's Shirts"
        name_id: "Kemeja Pria"
        description: "Formal shirts, casual shirts, and batik shirts for men"
        examples: ["Kemeja batik", "Kemeja formal", "Kemeja flanel"]

      - code: "FASHION_PRIA_KAOS"
        name: "Men's T-Shirts & Polos"
        name_id: "Kaos Pria"
        description: "Casual t-shirts, polo shirts, and casual tops"
        examples: ["Kaos polos", "Kaos polo", "Kaos oblong"]

      - code: "FASHION_PRIA_CELANA"
        name: "Men's Pants"
        name_id: "Celana Pria"
        description: "Trousers, jeans, shorts, and casual pants"
        examples: ["Celana jeans", "Celana chino", "Celana pendek", "Celana kain"]

      - code: "FASHION_PRIA_KOKO"
        name: "Men's Islamic Wear"
        name_id: "Baju Koko & Muslim Pria"
        description: "Koko shirts, sarongs, and Islamic attire for men"
        examples: ["Baju koko", "Sarung", "Peci", "Jubah pria"]

      - code: "FASHION_PRIA_JAKET"
        name: "Men's Outerwear"
        name_id: "Jaket & Sweater Pria"
        description: "Jackets, hoodies, sweaters, and blazers"
        examples: ["Jaket jeans", "Hoodie", "Blazer", "Jas"]

  - code: "FASHION_WANITA"
    name: "Women's Fashion"
    name_id: "Fashion Wanita"
    description: "Women's clothing, footwear, and accessories"
    beckn_category_id: "Womens Wear"
    sub_categories:
      - code: "FASHION_WANITA_ATASAN"
        name: "Women's Tops"
        name_id: "Atasan Wanita"
        description: "Blouses, shirts, and casual tops for women"
        examples: ["Blouse", "Atasan batik", "Tank top", "Crop top"]

      - code: "FASHION_WANITA_BAWAHAN"
        name: "Women's Bottoms"
        name_id: "Bawahan Wanita"
        description: "Skirts, pants, and shorts for women"
        examples: ["Rok", "Celana kulot", "Celana jeans wanita", "Hot pants"]

      - code: "FASHION_WANITA_DRESS"
        name: "Dresses"
        name_id: "Dress & Gaun"
        description: "Casual dresses, formal gowns, and midi dresses"
        examples: ["Dress batik", "Gaun pesta", "Midi dress", "Maxi dress"]

      - code: "FASHION_WANITA_KEBAYA"
        name: "Kebaya"
        name_id: "Kebaya"
        description: "Traditional Indonesian kebaya in various regional styles"
        examples: ["Kebaya Jawa", "Kebaya Bali", "Kebaya encim", "Kebaya modern"]

      - code: "FASHION_WANITA_HIJAB"
        name: "Hijab & Muslim Fashion"
        name_id: "Hijab & Busana Muslim"
        description: "Hijabs, modest fashion, gamis, and Islamic wear for women"
        examples: ["Hijab segi empat", "Pashmina", "Gamis", "Tunik muslim", "Mukena"]

  - code: "FASHION_ANAK"
    name: "Kids' Fashion"
    name_id: "Fashion Anak"
    description: "Clothing for children and teenagers"
    beckn_category_id: "Kids Wear"
    sub_categories:
      - code: "FASHION_ANAK_BAYI"
        name: "Baby Clothes"
        name_id: "Baju Bayi (0-2 tahun)"
        description: "Clothing for infants and toddlers"
        examples: ["Jumper bayi", "Setelan bayi", "Baju tidur bayi"]

      - code: "FASHION_ANAK_KECIL"
        name: "Young Children Clothes"
        name_id: "Baju Anak (3-10 tahun)"
        description: "Clothing for young children"
        examples: ["Kaos anak", "Dress anak", "Celana anak"]

      - code: "FASHION_ANAK_SERAGAM"
        name: "School Uniforms"
