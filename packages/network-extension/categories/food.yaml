# Indonesia Network Extension Layer - Food Category Taxonomy
# Indonesian food categories for retail and F&B domains

version: "1.0.0"
domain: "ONDC:RET11"

categories:
  - code: "FOOD_SNACK"
    name: "Snacks"
    name_id: "Makanan Ringan"
    description: "Packaged snacks, chips, crackers, and traditional Indonesian snack foods"
    beckn_category_id: "Snacks and Namkeen"
    sub_categories:
      - code: "FOOD_SNACK_KERIPIK"
        name: "Chips & Crackers"
        name_id: "Keripik & Kerupuk"
        description: "Potato chips, cassava chips, shrimp crackers, and other crispy snacks"
        examples: ["Keripik singkong", "Kerupuk udang", "Emping melinjo", "Chitato"]

      - code: "FOOD_SNACK_KACANG"
        name: "Nuts & Seeds"
        name_id: "Kacang-kacangan"
        description: "Roasted peanuts, cashews, and seasoned nut mixes"
        examples: ["Kacang tanah", "Kacang mete", "Kacang atom", "Dua Kelinci"]

      - code: "FOOD_SNACK_KERING"
        name: "Dried Snacks"
        name_id: "Makanan Kering"
        description: "Dried fruits, jerky, dried fish snacks"
        examples: ["Dendeng", "Ikan asin", "Sale pisang", "Manisan"]

      - code: "FOOD_SNACK_TRADISIONAL"
        name: "Traditional Snacks"
        name_id: "Jajanan Tradisional"
        description: "Traditional Indonesian kueh and jajanan pasar"
        examples: ["Onde-onde", "Klepon", "Lemper", "Bika Ambon"]

  - code: "FOOD_BUMBU"
    name: "Spices & Seasonings"
