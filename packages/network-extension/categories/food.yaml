      - code: "FOOD_BUMBU_BUBUK"
        name: "Ground Spices"
        name_id: "Bumbu Bubuk"
        description: "Pre-ground spice powders"
        examples: ["Kunyit bubuk", "Ketumbar bubuk", "Merica bubuk", "Jintan"]

      - code: "FOOD_BUMBU_JADI"
        name: "Instant Seasoning"
