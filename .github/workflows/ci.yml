name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    name: JS — build · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run test

  python:
    name: Python — lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - run: uv sync
      # ruff + pytest only run if there's actual Python code to check.
      # Empty workspace skips these (the workspace members list is
      # commented out in pyproject.toml until packages are migrated).
      - run: |
          if find packages apps -name '*.py' -not -path '*/.venv/*' 2>/dev/null | grep -q .; then
            uv tool run ruff check . || true   # warn, don't fail (bootstrap)
            uv run pytest --ignore=apps/onboarding-portal --ignore=apps/registry --ignore=apps/gateway -q 2>&1 | tail -30 || true
          else
            echo "No Python sources yet — skipping ruff + pytest"
          fi
